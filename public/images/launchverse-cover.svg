<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none">
  <defs>
    <linearGradient id="lv-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a12"/>
      <stop offset="1" stop-color="#0c0a18"/>
    </linearGradient>
    <radialGradient id="lv-violet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lv-cyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lv-indigo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lv-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c7c8ff"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="lv-arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="lv-orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#d8b4fe"/>
      <stop offset="1" stop-color="#a855f7"/>
    </radialGradient>
    <pattern id="lv-dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <filter id="lv-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="520" fill="url(#lv-bg)"/>
  <rect width="1200" height="520" fill="url(#lv-dots)"/>

  <!-- ambient glows -->
  <circle cx="1010" cy="70" r="300" fill="url(#lv-violet)"/>
  <circle cx="120" cy="470" r="260" fill="url(#lv-indigo)"/>
  <circle cx="1130" cy="430" r="220" fill="url(#lv-cyan)"/>

  <!-- launch trajectory -->
  <path d="M150 470 C 520 470, 760 400, 1070 120" stroke="url(#lv-arc)" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#lv-blur)"/>
  <path d="M150 470 C 520 470, 760 400, 1070 120" stroke="url(#lv-arc)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- round milestones along the arc -->
  <g fill="#0c0a18" stroke="#a855f7" stroke-width="2.5">
    <circle cx="470" cy="447" r="7"/>
    <circle cx="720" cy="392" r="7"/>
    <circle cx="915" cy="278" r="7"/>
  </g>

  <!-- launch burst -->
  <circle cx="1070" cy="120" r="60" fill="url(#lv-violet)"/>
  <circle cx="1070" cy="120" r="34" fill="none" stroke="#ffffff" stroke-opacity="0.18"/>
  <circle cx="1070" cy="120" r="22" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
  <circle cx="1070" cy="120" r="13" fill="url(#lv-orb)"/>

  <!-- sparkles -->
  <g fill="#ffffff" fill-opacity="0.7">
    <circle cx="980" cy="210" r="2"/>
    <circle cx="1130" cy="180" r="1.6"/>
    <circle cx="900" cy="120" r="1.6"/>
    <circle cx="1040" cy="300" r="1.4"/>
  </g>

  <!-- pill -->
  <g>
    <rect x="80" y="60" width="226" height="40" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#a855f7" stroke-opacity="0.5"/>
    <circle cx="104" cy="80" r="5" fill="#34d399"/>
    <text x="122" y="86" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="600" letter-spacing="2" fill="#e9e9f2">INNOVATION HUNT</text>
  </g>

  <!-- wordmark -->
  <text x="78" y="288" font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="700" letter-spacing="-3" fill="#f4f4f8">Launch<tspan fill="url(#lv-text)">Verse</tspan></text>

  <!-- tagline -->
  <text x="82" y="338" font-family="Inter, system-ui, sans-serif" font-size="27" font-weight="500" fill="#b7b7c6">Talent &amp; opportunities platform · Grades 8–12</text>

  <!-- process -->
  <text x="82" y="392" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" letter-spacing="1" fill="#8b8cf9">Problem  →  Prototype  →  Pitch</text>
</svg>
